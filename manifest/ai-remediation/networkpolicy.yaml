apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-remediation-default-deny
  namespace: ai-remediation
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress: []
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ai-remediation-limitrange
  namespace: ai-remediation
spec:
  limits:
    - type: Container
      min:
        cpu: "100m"
        memory: "64Mi"
      max:
        cpu: "1"
        memory: "512Mi"
      defaultRequest:
        cpu: "250m"
        memory: "128Mi"
      default:
        cpu: "500m"
        memory: "256Mi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ai-remediation-quota
  namespace: ai-remediation
spec:
  hard:
    pods: "10"
    services: "5"
    requests.cpu: "2"
    requests.memory: "4Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"