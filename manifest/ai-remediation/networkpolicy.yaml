apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-remediation-default-deny
  namespace: ai-remediation
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress: []
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 6443
