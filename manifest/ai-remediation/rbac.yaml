apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-remediation
  namespace: ai-remediation
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-remediation-reader
rules:
  - apiGroups: ["aquasecurity.github.io"]
    resources: ["vulnerabilityreports", "configauditreports"]
    verbs: ["get", "list"]
  - apiGroups: ["wgpolicyk8s.io"]
    resources: ["policyreports", "clusterpolicyreports"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-remediation-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-remediation-reader
subjects:
  - kind: ServiceAccount
    name: ai-remediation
    namespace: ai-remediation
---
apiVersion: v1
kind: LimitRange
metadata:
  name: ai-remediation-limitrange
  namespace: ai-remediation
spec:
  limits:
    - type: Container
      min:
        cpu: "100m"
        memory: "64Mi"
      max:
        cpu: "1"
        memory: "512Mi"
      defaultRequest:
        cpu: "250m"
        memory: "128Mi"
      default:
        cpu: "500m"
        memory: "256Mi"
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ai-remediation-quota
  namespace: ai-remediation
spec:
  hard:
    pods: "10"
    services: "5"
    requests.cpu: "2"
    requests.memory: "4Gi"
    limits.cpu: "4"
    limits.memory: "8Gi"