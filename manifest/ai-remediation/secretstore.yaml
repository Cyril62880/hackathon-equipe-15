apiVersion: v1
kind: Namespace
metadata:
  name: eso-source
  labels:
    pod-security.kubernetes.io/enforce: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eso-source-reader
  namespace: eso-source
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: eso-source-reader
  namespace: eso-source
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: eso-source-reader
  namespace: eso-source
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: eso-source-reader
subjects:
  - kind: ServiceAccount
    name: eso-source-reader
    namespace: eso-source
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: k8s-backend
spec:
  provider:
    kubernetes:
      remoteNamespace: eso-source
      server:
        url: https://kubernetes.default.svc
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: eso-source
          key: ca.crt
      auth:
        serviceAccount:
          name: eso-source-reader
          namespace: eso-source
