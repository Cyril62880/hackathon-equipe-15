apiVersion: batch/v1
kind: CronJob
metadata:
  name: ai-remediation
  namespace: ai-remediation
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      activeDeadlineSeconds: 900
      template:
        metadata:
          labels:
            app: ai-remediation
        spec:
          serviceAccountName: ai-remediation
          restartPolicy: Never
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: remediate
              image: myregistry.example.com/ai-remediation@sha256:abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890
              imagePullPolicy: IfNotPresent
              args:
                - "--from-cluster"
                - "--target"
                - "manifest/vulnerable-app/base/deployment.yaml"
                - "manifest/vulnerable-app/base/rbac.yaml"
                - "manifest/vulnerable-app/base/leaked-secret.yaml"
                - "manifest/alnoria/base/api.yaml"
                - "manifest/alnoria/base/web.yaml"
                - "manifest/alnoria/base/database.yaml"
                - "manifest/ai-remediation/cronjob.yaml"
                - "manifest/ai-remediation/rbac.yaml"
                - "manifest/ai-remediation/networkpolicy.yaml"
                - "--repo"
                - "Cyril62880/hackathon-equipe-15"
                - "--base-branch"
                - "main"
              envFrom:
                - secretRef:
                    name: ai-remediation-secrets
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: tmp
              emptyDir: {}