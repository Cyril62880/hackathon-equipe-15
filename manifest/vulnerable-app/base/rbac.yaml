apiVersion: v1
kind: ServiceAccount
metadata:
  name: dvwa-sa
  namespace: demo-vulnerable
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dvwa-view-binding
  namespace: demo-vulnerable
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: dvwa-sa
    namespace: demo-vulnerable