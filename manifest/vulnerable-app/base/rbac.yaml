apiVersion: v1
kind: ServiceAccount
metadata:
  name: dvwa-sa
  namespace: demo-vulnerable
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dvwa-cluster-admin
  labels:
    demo: insecure-on-purpose
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: dvwa-sa
    namespace: demo-vulnerable