apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-web
  namespace: demo-vulnerable
  labels:
    app: vulnerable-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-web
  template:
    metadata:
      labels:
        app: vulnerable-web
    spec:
      serviceAccountName: dvwa-sa
      automountServiceAccountToken: false
      containers:
        - name: dvwa
          image: vulnerables/web-dvwa@sha256:1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root"
            - name: AWS_ACCESS_KEY_ID
              value: "AKIAIOSFODNN7EXAMPLE"
            - name: AWS_SECRET_ACCESS_KEY
              value: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
      # No hostPath or secret volumes are mounted
