apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-web
  namespace: demo-vulnerable
  labels:
    app: vulnerable-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-web
  template:
    metadata:
      labels:
        app: vulnerable-web
    spec:
      serviceAccountName: dvwa-sa
      automountServiceAccountToken: false
      containers:
        - name: dvwa
          image: myregistry.azurecr.io/vulnerables/web-dvwa:1.9.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"