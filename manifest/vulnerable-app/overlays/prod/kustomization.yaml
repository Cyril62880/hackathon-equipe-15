apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: prod-vulnerable

resources:
  - ../../base
  - namespace.yaml

commonLabels:
  env: prod

patches:
  - target:
      kind: ClusterRoleBinding
      name: dvwa-cluster-admin
    patch: |
      - op: replace
        path: /metadata/name
        value: dvwa-cluster-admin-prod
  # Prod : 2 répliques pour la résilience.
  - target:
      kind: Deployment
      name: vulnerable-web
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2

