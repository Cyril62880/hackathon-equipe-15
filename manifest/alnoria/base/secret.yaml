apiVersion: v1
kind: Secret
metadata:
  name: alnoria-db-secret
  labels:
    app.kubernetes.io/name: alnoria
type: Opaque
stringData:
  # Valeurs de demo pour lancer l'application via Argo CD.
  # A remplacer par External Secrets pour un environnement durable.
  MARIADB_DATABASE: "alnoria"
  MARIADB_USER: "alnoria_app"
  MARIADB_PASSWORD: "change-me-alnoria"
  MARIADB_ROOT_PASSWORD: "change-me-alnoria-root"
  DB_USER: "alnoria_app"
  DB_PASSWORD: "change-me-alnoria"
