apiVersion: v1
kind: Service
metadata:
  name: alnoria-db
  labels:
    app.kubernetes.io/name: alnoria
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alnoria
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: alnoria-db
  labels:
    app.kubernetes.io/name: alnoria
    app.kubernetes.io/component: database
spec:
  serviceName: alnoria-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alnoria
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alnoria
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: db
          image: kasperski777/alnoria-db:latest
          imagePullPolicy: Always
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: alnoria-db-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: alnoria-db-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: alnoria-db-secret
                  key: POSTGRES_DB
          readinessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: postgres
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
