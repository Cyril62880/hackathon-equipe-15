apiVersion: v1
kind: ConfigMap
metadata:
  name: alnoria-config
  labels:
    app.kubernetes.io/name: alnoria
data:
  API_PORT: "8080"
  WEB_PORT: "80"
  DB_HOST: "alnoria-db"
  DB_PORT: "3306"
  DB_NAME: "alnoria"
  SPRING_PROFILES_ACTIVE: "kubernetes"
  DB_URL: "jdbc:mysql://alnoria-db:3306/alnoria?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  CORS_ALLOWED_ORIGIN_PATTERNS: "http://localhost:*,http://127.0.0.1:*"
  API_INTERNAL_URL: "http://alnoria-api:8080"
  AUTH_API_URL: "http://alnoria-api:8080"
  API_PROXY_TARGET: "http://alnoria-api:8080"
  API_PUBLIC_URL: "/api"
  VITE_API_URL: "/api"
  REACT_APP_API_URL: "/api"
  NEXT_PUBLIC_API_URL: "/api"
