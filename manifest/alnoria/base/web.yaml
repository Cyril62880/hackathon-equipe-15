apiVersion: v1
kind: Service
metadata:
  name: alnoria-web
  labels:
    app.kubernetes.io/name: alnoria
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alnoria
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alnoria-web
  labels:
    app.kubernetes.io/name: alnoria
    app.kubernetes.io/component: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alnoria
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alnoria
        app.kubernetes.io/component: web
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: kasperski777/alnoria-web:1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: API_INTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: alnoria-config
                  key: API_INTERNAL_URL
            - name: AUTH_API_URL
              valueFrom:
                configMapKeyRef:
                  name: alnoria-config
                  key: AUTH_API_URL
            - name: API_PROXY_TARGET
              valueFrom:
                configMapKeyRef:
                  name: alnoria-config
                  key: API_PROXY_TARGET
            - name: API_PUBLIC_URL
              valueFrom:
                configMapKeyRef:
                  name: alnoria-config
                  key: API_PUBLIC_URL
            - name: VITE_API_URL
              valueFrom:
                configMapKeyRef:
                  name: alnoria-config
                  key: VITE_API_URL
            - name: REACT_APP_API_URL
              valueFrom:
                configMapKeyRef:
                  name: alnoria-config
                  key: REACT_APP_API_URL
            - name: NEXT_PUBLIC_API_URL
              valueFrom:
                configMapKeyRef:
                  name: alnoria-config
                  key: NEXT_PUBLIC_API_URL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL