apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vulnerable-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Cyril62880/hackathon-equipe-15.git
    targetRevision: main
    path: manifest/vulnerable-app/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-vulnerable
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
