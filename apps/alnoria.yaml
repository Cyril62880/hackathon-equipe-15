apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alnoria-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Cyril62880/hackathon-equipe-15.git
    targetRevision: main
    path: manifest/alnoria/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev-alnoria
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
