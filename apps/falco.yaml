apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: falco
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://falcosecurity.github.io/charts
    chart: falco
    targetRevision: "*"
    helm:
      releaseName: falco
      values: |
        tty: true

        falco:
          jsonOutput: true
          logLevel: info
          metrics:
            enabled: true
            interval: 1m
            outputRule: true
            rulesCountersEnabled: true
            resourceUtilizationEnabled: true
            stateCountersEnabled: true
            kernelEventCountersEnabled: true

        serviceMonitor:
          create: true

        driver:
          kind: modern_ebpf

        collectors:
          kubernetes:
            enabled: true

        falcosidekick:
          enabled: true
          config:
            kubernetesevent:
              enabled: "true"
              namespace: "falco"
  destination:
    server: https://kubernetes.default.svc
    namespace: falco
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
