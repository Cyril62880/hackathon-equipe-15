name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]
    paths:
      - 'ai-remediation/**'
      - '.github/workflows/ci.yml'

jobs:
  lint:
    name: Node.js lint & syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-remediation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ai-remediation/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          for f in src/*.js; do
            node --input-type=module --eval "$(cat $f)" < /dev/null || true
            node --check "$f"
          done
